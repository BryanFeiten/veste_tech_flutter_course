name: database_examples
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # Gerenciamento de Estado
  mobx: ">=2.6.0 <2.7.0"
  flutter_mobx: ">=2.3.0 <2.4.0"
  # Injeção de Dependências
  get_it: ">=8.2.0 <8.3.0"
  # Gerenciamento de arquivos (buscar uma pasta que possa ser utilizada)
  path: ">=1.9.0 <1.10.0"
  path_provider: ">=2.1.0 <2.2.0"

  # Bancos de dados
  shared_preferences: ">=2.5.0 <2.6.0"
  flutter_secure_storage: ">=10.0.0 <10.1.0"
  hive_ce: ">=2.19.0 <2.20.0"
  sqflite: ">=2.4.0 <2.5.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=6.0.0 <6.1.0"

  # Mobx
  mobx_codegen: ">=2.7.0 <2.8.0"

  # Hive
  hive_ce_generator: ">=1.11.0 <1.12.0"
  build_runner: ">=2.13.0 <2.14.0"
  # Para rodar o build_runner:
  # Build uma vez: `dart run build_runner build -d`
  # Build e acompanha: `dart run build_runner watch -d`

flutter:
  uses-material-design: true
